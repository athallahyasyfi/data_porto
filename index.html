<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Data Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #f9f8f5;
      --line: #e9e7e2;
      --text: #1a1a1a;
      --muted: #9a9793;
      --subtle: #c8c5bf;
      --chip-bg: #f0eeea;
      --chip-color: #7a7772;
      --stat-bg: #f3f1ed;
      --story-bg: #f5f4f0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', -apple-system, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 72px 48px 64px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      border-bottom: 1px solid var(--line);
    }

    .header-left h1 {
      font-size: 36px;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .header-left h1 em {
      font-style: normal;
      color: var(--muted);
      font-weight: 300;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      padding-bottom: 4px;
    }

    .header-sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      text-align: right;
      line-height: 1.7;
    }

    /* ── LANG TOGGLE ── */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .lang-btn {
      padding: 5px 11px;
      font-size: 11px;
      font-family: 'Geist', sans-serif;
      font-weight: 400;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .02em;
    }

    .lang-btn.active {
      background: var(--text);
      color: #fff;
    }

    .lang-btn:not(.active):hover {
      background: var(--chip-bg);
      color: var(--text);
    }

    /* ── PROJECTS ── */
    .projects {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }

    .project {
      padding: 56px 0;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 56px;
      align-items: start;
    }

    .project-index {
      font-size: 11px;
      color: var(--subtle);
      font-weight: 300;
      letter-spacing: .06em;
      margin-bottom: 10px;
    }

    .project-name {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tag {
      background: var(--chip-bg);
      color: var(--chip-color);
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .02em;
    }

    .tag.date {
      background: none;
      color: var(--muted);
      padding-left: 0;
    }

    .project-count {
      font-size: 11px;
      color: var(--subtle);
      font-weight: 300;
      margin-top: 4px;
    }

    .project-desc {
      font-size: 13.5px;
      color: #555;
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 20px;
    }

    /* ── CASE STUDY TOGGLE ── */
    .cs-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      letter-spacing: .02em;
      margin-bottom: 24px;
      padding: 8px 14px 8px 12px;
      background: var(--chip-bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      transition: all .2s;
      user-select: none;
    }

    .cs-toggle:hover {
      border-color: #aaa;
      background: #ebe9e4;
    }

    .cs-toggle .cs-toggle-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      transition: transform .3s cubic-bezier(.16, 1, .3, 1);
    }

    .cs-toggle.open .cs-toggle-icon {
      transform: rotate(45deg);
    }

    /* ── CASE STUDY BODY ── */
    .cs-body {
      display: none;
      background: var(--story-bg);
      border-radius: 8px;
      padding: 28px 28px 24px;
      margin-bottom: 24px;
      border: 1px solid var(--line);
      animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .cs-body.open {
      display: block;
    }

    .cs-section {
      margin-bottom: 22px;
    }

    .cs-section:last-child {
      margin-bottom: 0;
    }

    .cs-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--subtle);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .cs-background {
      font-size: 13px;
      color: #555;
      font-weight: 300;
      line-height: 1.75;
    }

    .cs-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .cs-step {
      display: flex;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .cs-step:last-child {
      border-bottom: none;
    }

    .cs-step-num {
      font-size: 10px;
      color: var(--subtle);
      font-weight: 300;
      min-width: 18px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .cs-step-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .cs-step-detail {
      font-size: 12.5px;
      color: #777;
      font-weight: 300;
      line-height: 1.65;
    }

    .cs-step-img {
      margin-top: 10px;
      border-radius: 6px;
      overflow: hidden;
      cursor: zoom-in;
      max-width: 100%;
      border: 1px solid var(--line);
    }

    .cs-step-img img {
      width: 100%;
      display: block;
      max-height: 280px;
      object-fit: cover;
      transition: transform .4s cubic-bezier(.16, 1, .3, 1);
    }

    .cs-step-img:hover img {
      transform: scale(1.02);
    }

    .cs-insights {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cs-insight {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 12.5px;
      color: #555;
      font-weight: 300;
      line-height: 1.6;
    }

    .cs-insight::before {
      content: '→';
      color: var(--subtle);
      font-size: 11px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 28px;
    }

    .stat {
      background: var(--stat-bg);
      border-radius: 6px;
      padding: 10px 16px;
      min-width: 90px;
    }

    .stat-val {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 3px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: .02em;
      line-height: 1.3;
    }

    /* ── THUMBNAILS ── */
    .thumbs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .thumb {
      width: 200px;
      height: 126px;
      border-radius: 6px;
      overflow: hidden;
      cursor: zoom-in;
      background: var(--line);
      flex-shrink: 0;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s cubic-bezier(.16, 1, .3, 1);
    }

    .thumb:hover img {
      transform: scale(1.07);
    }

    .small-text {
      margin-top: 14px;
      font-size: 11px;
      color: var(--subtle);
      font-style: italic;
      font-weight: 300;
    }

    /* ── LIVE LINK ── */
    .live-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 22px;
      padding: 8px 14px;
      font-size: 11.5px;
      font-family: 'Geist', sans-serif;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      text-decoration: none;
      transition: all .18s;
      cursor: pointer;
    }

    .live-link:hover {
      border-color: #aaa;
      background: var(--chip-bg);
    }

    .live-link-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(74, 222, 128, .2);
    }

    /* ── LIGHTBOX ── */
    .lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(249, 248, 245, .95);
      backdrop-filter: blur(20px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .lb.open {
      display: flex;
    }

    .lb-img-wrap {
      max-width: 90vw;
      max-height: 84vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb img {
      max-width: 88vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 32px 96px rgba(0, 0, 0, .09);
      display: block;
    }

    .lb-prev,
    .lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .18s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
    }

    .lb-prev {
      left: 20px;
    }

    .lb-next {
      right: 20px;
    }

    .lb-prev:hover,
    .lb-next:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .lb-prev.hidden,
    .lb-next.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .lb-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .lb-info {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    .lb-info strong {
      color: var(--text);
      font-weight: 500;
    }

    .lb-close {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      transition: color .15s;
    }

    .lb-close:hover {
      color: var(--text);
    }

    .lb-dots {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--line);
      cursor: pointer;
      transition: background .2s;
    }

    .dot.active {
      background: var(--text);
    }

    /* ── CMS PANEL ── */
    #cms-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .3);
      z-index: 300;
      backdrop-filter: blur(4px);
    }

    #cms-overlay.open {
      display: block;
    }

    #cms-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(680px, 100vw);
      background: #fff;
      z-index: 301;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.16, 1, .3, 1);
      box-shadow: -20px 0 60px rgba(0, 0, 0, .1);
    }

    #cms-panel.open {
      transform: translateX(0);
    }

    .cms-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .cms-header h2 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .cms-header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .cms-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* sidebar */
    .cms-sidebar {
      width: 180px;
      border-right: 1px solid var(--line);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .cms-sidebar-inner {
      padding: 12px 0;
      flex: 1;
    }

    .cms-proj-item {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .12s, color .12s;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .cms-proj-item:hover {
      color: var(--text);
      background: #fafaf8;
    }

    .cms-proj-item.active {
      color: var(--text);
      border-left-color: var(--text);
      background: #f9f8f5;
      font-weight: 400;
    }

    .cms-proj-item.cms-dragging {
      opacity: .25;
      background: #f5f4f0;
    }

    .cms-proj-item.cms-drag-over-top {
      border-top: 2px solid var(--text);
    }

    .cms-proj-item.cms-drag-over-bot {
      border-bottom: 2px solid var(--text);
    }

    .cms-drag-grip {
      color: var(--subtle);
      cursor: grab;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .cms-drag-grip:active {
      cursor: grabbing;
    }

    .cms-proj-item:hover .cms-drag-grip {
      opacity: 1;
    }

    .cms-proj-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cms-add-btn {
      display: block;
      width: calc(100% - 24px);
      margin: 8px 12px 12px;
      padding: 8px;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px dashed var(--line);
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      font-family: 'Geist', sans-serif;
      transition: all .15s;
      flex-shrink: 0;
    }

    .cms-add-btn:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .cms-form {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 40px;
    }

    .cms-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--subtle);
      font-weight: 300;
    }

    .cms-field {
      margin-bottom: 16px;
    }

    .cms-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }

    .cms-input,
    .cms-textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 12.5px;
      font-family: 'Geist', sans-serif;
      font-weight: 300;
      color: var(--text);
      background: #fafaf8;
      border: 1px solid var(--line);
      border-radius: 5px;
      outline: none;
      transition: border-color .15s;
    }

    .cms-input:focus,
    .cms-textarea:focus {
      border-color: #aaa;
    }

    .cms-textarea {
      resize: vertical;
      min-height: 70px;
      line-height: 1.6;
    }

    .cms-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .cms-section-title {
      font-size: 10px;
      font-weight: 500;
      color: var(--subtle);
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .cms-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
      margin-top: 4px;
    }

    .cms-tab {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
      font-family: 'Geist', sans-serif;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .cms-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
      font-weight: 400;
    }

    .cms-tab-panel {
      display: none;
    }

    .cms-tab-panel.active {
      display: block;
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .step-item {
      background: #f5f4f0;
      border-radius: 6px;
      padding: 12px;
      position: relative;
    }

    .step-item .cms-input {
      margin-bottom: 6px;
      background: #fff;
    }

    .step-item .cms-textarea {
      background: #fff;
      min-height: 50px;
    }

    .step-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      font-size: 15px;
      color: var(--subtle);
      cursor: pointer;
      line-height: 1;
      transition: color .15s;
    }

    .step-remove:hover {
      color: #c44;
    }

    .step-img-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .step-img-preview {
      width: 48px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid var(--line);
      display: none;
    }

    .step-img-preview.show {
      display: block;
    }

    .stat-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .stat-item {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .stat-item .cms-input {
      flex: 1;
    }

    .stat-item button,
    .insight-item button {
      background: none;
      border: none;
      font-size: 15px;
      color: var(--subtle);
      cursor: pointer;
      flex-shrink: 0;
      transition: color .15s;
    }

    .stat-item button:hover,
    .insight-item button:hover {
      color: #c44;
    }

    .insight-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .insight-item {
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    .insight-item .cms-textarea {
      flex: 1;
      min-height: 40px;
    }

    .insight-item button {
      margin-top: 6px;
    }

    .cms-btn-add {
      display: inline-block;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: 1px dashed var(--line);
      border-radius: 4px;
      padding: 5px 10px;
      font-family: 'Geist', sans-serif;
      transition: all .15s;
    }

    .cms-btn-add:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .i18n-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .i18n-pair .lang-flag {
      font-size: 10px;
      color: var(--subtle);
      margin-bottom: 3px;
      font-weight: 400;
    }

    .cms-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .cms-footer-left {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 7px 14px;
      font-size: 11.5px;
      font-family: 'Geist', sans-serif;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid var(--line);
      transition: all .15s;
      font-weight: 400;
    }

    .btn-primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-ghost {
      background: none;
      color: var(--muted);
    }

    .btn-ghost:hover {

        const story = p.story || {}; let csHtml = '';
        const bgText = getLangVal(story.background); const steps = story.steps || []; const insights = getLangVal(story.insights);

        if (bgText || (steps.length > 0) || (insights && insights.length)) {
          const stepsHtml = steps.map((s, i) => {
            const title = getLangVal(s.title); const detail = getLangVal(s.detail); const imgSrc = s.image || '';
            const imgHtml = imgSrc ? `<div class="cs-step-img" onclick="openLbSingle('${esc(imgSrc)}')"><img src="${esc(imgSrc)}" alt="${esc(title)}" loading="lazy"></div>` : '';
            return `<div class="cs-step"><div class="cs-step-num">${String(i + 1).padStart(2, '0')}</div><div class="cs-step-content"><div class="cs-step-title">${esc(title)}</div><div class="cs-step-detail">${esc(detail)}</div>${imgHtml}</div></div>`;
          }).join('');
          const insightsHtml = (Array.isArray(insights) ? insights : []).map(ins => `<div class="cs-insight">${esc(ins)}</div>`).join('');
          csHtml = `<button class="cs-toggle" onclick="toggleStory(this)"><span class="cs-toggle-icon">+</span><span class="cs-toggle-label">${t('viewCS')}</span></button>
        <div class="cs-body">
          ${bgText ? `<div class="cs-section"><div class="cs-label">${t('background')}</div><div class="cs-background">${esc(bgText)}</div></div>` : ''}
          ${stepsHtml ? `<div class="cs-section"><div class="cs-label">${t('process')}</div><div class="cs-steps">${stepsHtml}</div></div>` : ''}
          ${insightsHtml ? `<div class="cs-section"><div class="cs-label">${t('keyInsights')}</div><div class="cs-insights">${insightsHtml}</div></div>` : ''}
        </div>`;
        }

        const el = document.createElement('div');
        el.className = 'project'; el.dataset.idx = idx; el.dataset.name = p.name || '';
        el.innerHTML = `
      <div class="project-left">
        <div class="project-index">${numStr}</div>
        <div class="project-name">${nameHtml}</div>
        <div class="project-meta"><span class="tag date">${esc(p.period || '')}</span>${tagsHtml}</div>
        <div class="project-count">${imgCount} ${imgCount === 1 ? t('screenshot') : t('screenshots')}</div>
      </div>
      <div class="project-right">
        <p class="project-desc">${esc(descText)}</p>
        ${liveLinkHtml}${csHtml}
        <div class="stats">${statsHtml}</div>
        <div class="thumbs">${thumbsHtml}</div>
        ${p.note ? `<div class="small-text">${esc(p.note)}</div>` : ''}
      </div>`;
        container.appendChild(el);
      });
      bindLightbox();
    }
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    // ════════════════════════════════════════════
    // CASE STUDY TOGGLE
    // ════════════════════════════════════════════
    function toggleStory(btn) {
      const body = btn.nextElementSibling; const open = body.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.querySelector('.cs-toggle-label').textContent = open ? t('hideCS') : t('viewCS');
    }

    // ════════════════════════════════════════════
    // LIGHTBOX
    // ════════════════════════════════════════════
    let lbImgs = [], lbCur = 0, lbName = '';
    function bindLightbox() {
      document.querySelectorAll('.project').forEach(proj => {
        const name = proj.dataset.name.replace(/\n/g, ' ');
        const thumbImgs = [...proj.querySelectorAll('.thumb img')];
        thumbImgs.forEach((img, i) => { img.parentElement.addEventListener('click', () => { lbImgs = thumbImgs.map(im => im.src); lbName = name; openLb(i); }); });
      });
    }
    function openLbSingle(src) { lbImgs = [src]; lbName = ''; openLb(0); }
    function openLb(index) { lbCur = index; document.getElementById('lb').classList.add('open'); document.getElementById('lb-project').textContent = lbName; buildDots(); showLb(); }
    function showLb() {
      document.getElementById('lb-img').src = lbImgs[lbCur];
      document.getElementById('lb-counter').textContent = lbImgs.length > 1 ? ' — ' + (lbCur + 1) + ' / ' + lbImgs.length : '';
      document.getElementById('lb-prev').classList.toggle('hidden', lbCur === 0);
      document.getElementById('lb-next').classList.toggle('hidden', lbCur === lbImgs.length - 1);
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === lbCur));
    }
    function navigate(dir) { lbCur = Math.max(0, Math.min(lbImgs.length - 1, lbCur + dir)); showLb(); }
    function buildDots() {
      const w = document.getElementById('lb-dots'); w.innerHTML = '';
      lbImgs.forEach((_, i) => { const d = document.createElement('div'); d.className = 'dot' + (i === lbCur ? ' active' : ''); d.onclick = () => { lbCur = i; showLb(); }; w.appendChild(d); });
    }
    function closeLb() { document.getElementById('lb').classList.remove('open'); }
    document.addEventListener('keydown', e => {
      if (document.getElementById('lb').classList.contains('open')) {
        if (e.key === 'ArrowRight') navigate(1); if (e.key === 'ArrowLeft') navigate(-1); if (e.key === 'Escape') closeLb();
      }
      if (e.ctrlKey && e.shiftKey && e.key === 'E') { e.preventDefault(); openCms(); }
    });
    document.getElementById('lb').addEventListener('click', e => { if (e.target === document.getElementById('lb')) closeLb(); });

    // ════════════════════════════════════════════
    // CMS — sidebar with drag-and-drop reorder
    // ════════════════════════════════════════════
    let cmsDragSrc = null;

    function openCms() {
      document.getElementById('cms-overlay').classList.add('open');
      setTimeout(() => document.getElementById('cms-panel').classList.add('open'), 10);
      renderCmsSidebar();
      document.getElementById('cms-form-area').className = 'cms-empty';
      document.getElementById('cms-form-area').innerHTML = 'Select a project to edit';
      document.getElementById('cms-delete-btn').style.display = 'none';
      activeProjIndex = null;
    }
    function closeCms() {
      document.getElementById('cms-panel').classList.remove('open');
      document.getElementById('cms-overlay').classList.remove('open');
    }

    function renderCmsSidebar() {
      const list = document.getElementById('cms-proj-list'); list.innerHTML = '';
      projects.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'cms-proj-item' + (i === activeProjIndex ? ' active' : '');
        el.draggable = true;
        el.dataset.idx = i;
        el.innerHTML = `
      <span class="cms-drag-grip" title="Drag to reorder">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="1" y1="2" x2="9" y2="2"/>
          <line x1="1" y1="5" x2="9" y2="5"/>
          <line x1="1" y1="8" x2="9" y2="8"/>
        </svg>
      </span>
      <span class="cms-proj-item-name">${esc((p.name || 'Untitled').replace(/\n/, ' '))}</span>`;

        el.addEventListener('click', e => { if (!e.target.closest('.cms-drag-grip')) editProject(i); });

        el.addEventListener('dragstart', e => {
          cmsDragSrc = i;
          setTimeout(() => el.classList.add('cms-dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => {
          el.classList.remove('cms-dragging');
          document.querySelectorAll('.cms-proj-item').forEach(it => it.classList.remove('cms-drag-over-top', 'cms-drag-over-bot'));
          cmsDragSrc = null;
        });
        el.addEventListener('dragover', e => {
          e.preventDefault();
          if (cmsDragSrc === null || cmsDragSrc === i) return;
          document.querySelectorAll('.cms-proj-item').forEach(it => it.classList.remove('cms-drag-over-top', 'cms-drag-over-bot'));
          const rect = el.getBoundingClientRect();
          el.classList.add(e.clientY < rect.top + rect.height / 2 ? 'cms-drag-over-top' : 'cms-drag-over-bot');
        });
        el.addEventListener('dragleave', () => el.classList.remove('cms-drag-over-top', 'cms-drag-over-bot'));
        el.addEventListener('drop', e => {
          e.preventDefault();
          el.classList.remove('cms-drag-over-top', 'cms-drag-over-bot');
          if (cmsDragSrc === null || cmsDragSrc === i) return;
          const rect = el.getBoundingClientRect();
          const after = e.clientY >= rect.top + rect.height / 2;
          let targetIdx = after ? i + 1 : i;
          const moved = projects.splice(cmsDragSrc, 1)[0];
          const insertAt = cmsDragSrc < targetIdx ? targetIdx - 1 : targetIdx;
          projects.splice(insertAt, 0, moved);
          if (activeProjIndex === cmsDragSrc) activeProjIndex = insertAt;
          else if (activeProjIndex !== null) {
            if (cmsDragSrc < activeProjIndex && insertAt >= activeProjIndex) activeProjIndex--;
            else if (cmsDragSrc > activeProjIndex && insertAt <= activeProjIndex) activeProjIndex++;
          }
          saveToStorage(); render(); renderCmsSidebar(); showHint(t('orderSaved'));
        });

        list.appendChild(el);
      });
    }

    function editProject(idx) {
      activeProjIndex = idx; renderCmsSidebar();
      document.getElementById('cms-delete-btn').style.display = 'block';
      const p = projects[idx]; const story = p.story || {};
      const stepsHtml = (story.steps || []).map((s, i) => stepItemHtml(i, s)).join('');
      const insightsEnHtml = ((story.insights?.en) || []).map((ins, i) => insightItemHtml('en', i, ins)).join('');
      const insightsIdHtml = ((story.insights?.id) || []).map((ins, i) => insightItemHtml('id', i, ins)).join('');
      const statsHtml = (p.stats || []).map((s, i) => statItemHtml(i, s.val, s.label)).join('');
      const imagesHtml = (p.images || []).map((img, i) => imageItemHtml(i, img)).join('');
      const bgEn = typeof story.background === 'object' ? story.background.en || '' : story.background || '';
      const bgId = typeof story.background === 'object' ? story.background.id || '' : '';
      const descEn = typeof p.description === 'object' ? p.description.en || '' : p.description || '';
      const descId = typeof p.description === 'object' ? p.description.id || '' : '';

      document.getElementById('cms-form-area').className = 'cms-form';
      document.getElementById('cms-form-area').innerHTML = `
    <div class="cms-tabs">
      <button class="cms-tab active" onclick="switchTab(this,'tab-basic')">Basic</button>
      <button class="cms-tab" onclick="switchTab(this,'tab-story')">Case Study</button>
      <button class="cms-tab" onclick="switchTab(this,'tab-stats')">Stats & Images</button>
    </div>
    <div class="cms-tab-panel active" id="tab-basic">
      <div class="cms-field"><label class="cms-label">Project name (\\n = line break)</label><input class="cms-input" id="f-name" value="${escVal(p.name || '')}"></div>
      <div class="cms-row">
        <div class="cms-field"><label class="cms-label">Period</label><input class="cms-input" id="f-period" value="${escVal(p.period || '')}"></div>
        <div class="cms-field"><label class="cms-label">Tags (comma separated)</label><input class="cms-input" id="f-tags" value="${escVal((p.tags || []).join(', '))}"></div>
      </div>
      <div class="cms-field">
        <label class="cms-label">Description</label>
        <div class="i18n-pair">
          <div><div class="lang-flag">🇬🇧 English</div><textarea class="cms-textarea" id="f-desc-en" rows="4">${escVal(descEn)}</textarea></div>
          <div><div class="lang-flag">🇮🇩 Indonesia</div><textarea class="cms-textarea" id="f-desc-id" rows="4">${escVal(descId)}</textarea></div>
        </div>
      </div>
      <div class="cms-field"><label class="cms-label">Footnote</label><input class="cms-input" id="f-note" value="${escVal(p.note || '')}"></div>
      <div class="cms-field"><label class="cms-label">Live dashboard link (optional)</label><input class="cms-input" id="f-livelink" placeholder="https://app.powerbi.com/..." value="${escVal(p.liveLink || '')}"></div>
    </div>
    <div class="cms-tab-panel" id="tab-story">
      <div class="cms-field">
        <label class="cms-label">Background</label>
        <div class="i18n-pair">
          <div><div class="lang-flag">🇬🇧 English</div><textarea class="cms-textarea" id="f-bg-en" rows="3">${escVal(bgEn)}</textarea></div>
          <div><div class="lang-flag">🇮🇩 Indonesia</div><textarea class="cms-textarea" id="f-bg-id" rows="3">${escVal(bgId)}</textarea></div>
        </div>
      </div>
      <div class="cms-label" style="margin-bottom:8px">Process Steps</div>
      <div class="step-list" id="step-list">${stepsHtml}</div>
      <button class="cms-btn-add" onclick="addStep()">+ add step</button>
      <div style="height:20px"></div>
      <div class="cms-label" style="margin-bottom:4px">Key Insights — EN</div>
      <div class="insight-list" id="insight-list-en">${insightsEnHtml}</div>
      <button class="cms-btn-add" onclick="addInsight('en')">+ add insight (EN)</button>
      <div style="height:12px"></div>
      <div class="cms-label" style="margin:8px 0 4px">Key Insights — ID</div>
      <div class="insight-list" id="insight-list-id">${insightsIdHtml}</div>
      <button class="cms-btn-add" onclick="addInsight('id')">+ add insight (ID)</button>
    </div>
    <div class="cms-tab-panel" id="tab-stats">
      <div class="cms-section-title">Stats</div>
      <div class="stat-list" id="stat-list">${statsHtml}</div>
      <button class="cms-btn-add" onclick="addStat()">+ add stat</button>
      <div class="cms-section-title" style="margin-top:20px">Project Images (thumbnails)</div>
      <div class="stat-list" id="image-list">${imagesHtml}</div>
      <button class="cms-btn-add" onclick="addImage()">+ add image path</button>
    </div>`;
    }

    function switchTab(btn, panelId) {
      btn.closest('.cms-form').querySelectorAll('.cms-tab').forEach(t => t.classList.remove('active'));
      btn.closest('.cms-form').querySelectorAll('.cms-tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active'); document.getElementById(panelId).classList.add('active');
    }
    function escVal(s) { return String(s || '').replace(/"/g, '&quot;').replace(/\n/g, '\\n'); }
    function stepItemHtml(i, s) {
      const titleEn = typeof s.title === 'object' ? s.title.en || '' : s.title || ''; const titleId = typeof s.title === 'object' ? s.title.id || '' : '';
      const detailEn = typeof s.detail === 'object' ? s.detail.en || '' : s.detail || ''; const detailId = typeof s.detail === 'object' ? s.detail.id || '' : '';
      const img = s.image || '';
      return `<div class="step-item" id="step-${i}">
    <button class="step-remove" onclick="removeItem('step-list','step-${i}')">×</button>
    <div class="i18n-pair" style="margin-bottom:6px">
      <div><div class="lang-flag">🇬🇧 Title</div><input class="cms-input" placeholder="Step title EN" value="${escVal(titleEn)}"></div>
      <div><div class="lang-flag">🇮🇩 Judul</div><input class="cms-input" placeholder="Judul step ID" value="${escVal(titleId)}"></div>
    </div>
    <div class="i18n-pair">
      <div><div class="lang-flag">🇬🇧 Detail</div><textarea class="cms-textarea" placeholder="Detail EN">${escVal(detailEn)}</textarea></div>
      <div><div class="lang-flag">🇮🇩 Detail</div><textarea class="cms-textarea" placeholder="Detail ID">${escVal(detailId)}</textarea></div>
    </div>
    <div class="step-img-row" style="margin-top:8px">
      <div class="lang-flag" style="flex-shrink:0">Step image (optional)</div>
      <input class="cms-input" placeholder="images/step.png" value="${escVal(img)}" oninput="previewStepImg(this,${i})" style="flex:1">
      <img class="step-img-preview${img ? ' show' : ''}" id="step-img-prev-${i}" src="${esc(img)}" alt="">
    </div>
  </div>`;
    }
    function previewStepImg(input, i) { const prev = document.getElementById('step-img-prev-' + i); if (prev) { prev.src = input.value; prev.classList.toggle('show', !!input.value); } }
    function insightItemHtml(l, i, text) { return `<div class="insight-item" id="insight-${l}-${i}"><textarea class="cms-textarea" placeholder="Insight...">${escVal(text || '')}</textarea><button onclick="removeItem('insight-list-${l}','insight-${l}-${i}')">×</button></div>`; }
    function statItemHtml(i, val, label) { return `<div class="stat-item" id="stat-${i}"><input class="cms-input" placeholder="Value" value="${escVal(val || '')}" style="max-width:110px"><input class="cms-input" placeholder="Label" value="${escVal(label || '')}"><button onclick="removeItem('stat-list','stat-${i}')">×</button></div>`; }
    function imageItemHtml(i, src) { return `<div class="stat-item" id="img-${i}"><input class="cms-input" placeholder="images/filename.png" value="${escVal(src || '')}"><button onclick="removeItem('image-list','img-${i}')">×</button></div>`; }
    function addStep() { const list = document.getElementById('step-list'); const i = list.children.length; const div = document.createElement('div'); div.innerHTML = stepItemHtml(i, { title: { en: '', id: '' }, detail: { en: '', id: '' }, image: '' }); list.appendChild(div.firstElementChild); }
    function addInsight(l) { const list = document.getElementById('insight-list-' + l); const i = list.children.length; const div = document.createElement('div'); div.innerHTML = insightItemHtml(l, i, ''); list.appendChild(div.firstElementChild); }
    function addStat() { const list = document.getElementById('stat-list'); const i = list.children.length; const div = document.createElement('div'); div.innerHTML = statItemHtml(i, '', ''); list.appendChild(div.firstElementChild); }
    function addImage() { const list = document.getElementById('image-list'); const i = list.children.length; const div = document.createElement('div'); div.innerHTML = imageItemHtml(i, ''); list.appendChild(div.firstElementChild); }
    function removeItem(listId, itemId) { const item = document.getElementById(itemId); if (item) item.remove(); }
    function addProject() {
      projects.push({ id: 'proj-' + Date.now(), name: 'New Project', period: '', tags: [], description: { en: '', id: '' }, story: { background: { en: '', id: '' }, steps: [], insights: { en: [], id: [] } }, stats: [], images: [], note: '', liveLink: '' });
      editProject(projects.length - 1); renderCmsSidebar();
    }
    function deleteProject() {
      if (activeProjIndex === null) return; if (!confirm('Delete this project?')) return;
      projects.splice(activeProjIndex, 1); activeProjIndex = null;
      saveToStorage(); render(); renderCmsSidebar();
      document.getElementById('cms-form-area').className = 'cms-empty';
      document.getElementById('cms-form-area').innerHTML = 'Select a project to edit';
      document.getElementById('cms-delete-btn').style.display = 'none';
    }
    function saveProject() {
      if (activeProjIndex === null) { closeCms(); return; }
      const name = (document.getElementById('f-name').value || '').replace(/\\n/g, '\n');
      const period = document.getElementById('f-period').value || '';
      const tags = (document.getElementById('f-tags').value || '').split(',').map(tg => tg.trim()).filter(Boolean);
      const descEn = (document.getElementById('f-desc-en')?.value || '').replace(/\\n/g, '\n');
      const descId = (document.getElementById('f-desc-id')?.value || '').replace(/\\n/g, '\n');
      const note = document.getElementById('f-note')?.value || '';
      const liveLink = document.getElementById('f-livelink')?.value.trim() || '';
      const bgEn = (document.getElementById('f-bg-en')?.value || '').replace(/\\n/g, '\n');
      const bgId = (document.getElementById('f-bg-id')?.value || '').replace(/\\n/g, '\n');
      const steps = [...(document.getElementById('step-list')?.children || [])].map(el => {
        const inputs = el.querySelectorAll('input:not([type="button"])');
        const textareas = el.querySelectorAll('textarea'); const imgInput = el.querySelector('.step-img-row input');
        return { title: { en: (inputs[0]?.value || '').replace(/\\n/g, '\n'), id: (inputs[1]?.value || '').replace(/\\n/g, '\n') }, detail: { en: (textareas[0]?.value || '').replace(/\\n/g, '\n'), id: (textareas[1]?.value || '').replace(/\\n/g, '\n') }, image: imgInput?.value || '' };
      }).filter(s => s.title.en || s.title.id);
      const insightsEn = [...(document.getElementById('insight-list-en')?.children || [])].map(el => (el.querySelector('textarea')?.value || '').replace(/\\n/g, '\n')).filter(Boolean);
      const insightsId = [...(document.getElementById('insight-list-id')?.children || [])].map(el => (el.querySelector('textarea')?.value || '').replace(/\\n/g, '\n')).filter(Boolean);
      const stats = [...(document.getElementById('stat-list')?.children || [])].map(el => { const ins = el.querySelectorAll('input'); return { val: ins[0]?.value || '', label: ins[1]?.value || '' }; }).filter(s => s.val || s.label);
      const images = [...(document.getElementById('image-list')?.children || [])].map(el => (el.querySelector('input')?.value || '').trim()).filter(Boolean);
      projects[activeProjIndex] = { ...projects[activeProjIndex], name, period, tags, note, liveLink, description: { en: descEn, id: descId }, story: { background: { en: bgEn, id: bgId }, steps, insights: { en: insightsEn, id: insightsId } }, stats, images };
      saveToStorage(); render(); renderCmsSidebar(); showHint(t('saved'));
    }

    // ════════════════════════════════════════════
    // EXPORT
    // ════════════════════════════════════════════
    function openExport() { document.getElementById('export-textarea').value = JSON.stringify(projects, null, 2); document.getElementById('export-modal').classList.add('open'); }
    function closeExport() { document.getElementById('export-modal').classList.remove('open'); }
    function copyExport() {
      const ta = document.getElementById('export-textarea'); ta.select();
      navigator.clipboard.writeText(ta.value).then(() => { showHint(t('copied')); closeExport(); }).catch(() => { document.execCommand('copy'); showHint(t('copied')); });
    }
    document.getElementById('export-modal').addEventListener('click', e => { if (e.target === document.getElementById('export-modal')) closeExport(); });

    // ════════════════════════════════════════════
    // HINT
    // ════════════════════════════════════════════
    let hintTimer;
    function showHint(msg) {
      const el = document.getElementById('cms-hint'); el.textContent = msg; el.classList.add('show');
      clearTimeout(hintTimer); hintTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // ════════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════════
    lang = localStorage.getItem('da_lang') || 'en';
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
    loadProjects(); render();
  </script>
</body>

</html>
